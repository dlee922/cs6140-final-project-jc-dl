# Pipeline Configuration

# Study Configuration
study:
  # Study ID from cBioPortal (find IDs at: https://www.cbioportal.org/datasets)
  study_id: "luad_mskcc_2023_met_organotropism"
  
  # Cancer type name (for display in plots)
  cancer_name: "Lung Adenocarcinoma"
  cancer_abbreviation: "LUAD"

# Model Configuration
clinical:
  hyperparameters:
    logistic_ridge:
      C: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
    logistic_lasso:
      C: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
    logistic:
      {}
    LDA:
      {}
    random_forest:
      n_estimators: [1, 20, 40, 60, 80, 100, 200, 300]
      max_depth: [3, 5, 10, null]  # null = None in yaml
      criterion: ['gini', 'log_loss', 'entropy']
